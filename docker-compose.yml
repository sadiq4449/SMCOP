services:
  db:
    image: postgres:16-alpine
    container_name: smocp-postgres
    environment:
      POSTGRES_DB: smocp
      POSTGRES_USER: smocp
      POSTGRES_PASSWORD: smocp
    ports:
      - "5432:5432"
    volumes:
      - smocp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smocp -d smocp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smocp_pg_data:
